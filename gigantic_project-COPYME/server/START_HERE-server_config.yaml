# ============================================================================
# GIGANTIC DATA SERVER CONFIGURATION
# ============================================================================
#
# Edit this file before starting the server.
#
# To start the server:
#   Local:  bash RUN-start_server.sh
#   SLURM:  sbatch RUN-start_server.sbatch
#
# ============================================================================

# AI: Claude Code | Opus 4.7 | 2026 April 20 | Purpose: GIGANTIC data server configuration (drill-down hierarchy)
# Human: Eric Edsinger

# ============================================================================
# Server Settings
# ============================================================================

# Project display name (shown in page header and browser tab)
project_name: "GIGANTIC DATA"

# Server port (change if port is already in use)
port: 9456

# Auto-refresh interval in seconds
# How often the server re-scans each subproject's upload_to_server/ tree.
# The directory tree is cached between refreshes for fast page loads.
refresh_interval_seconds: 300

# ============================================================================
# Subproject Ordering (EXPLICIT LIST — only these are shown)
# ============================================================================
# The landing page shows subprojects in this order.
# Subprojects NOT listed here are not displayed (the server silently ignores
# them even if they have upload_to_server/ data).
#
# This is an explicit allowlist — edit to include/exclude subprojects.

subproject_order:
  - gene_sizes
  - trees_species
  - trees_gene_families
  - trees_gene_groups
  - synteny
  - annotations_X_ocl
  - gene_sizes_X_ocl
  - orthogroups_X_ocl
  - trees_gene_families_X_ocl
  - trees_gene_groups_X_ocl
  - ocl_perspectives
  - moroz_innovations

# ============================================================================
# Landing Page: Empty Subprojects
# ============================================================================
# If a listed subproject has upload_to_server/ but no files yet, should we
# still show its card on the landing page (dimmed with "NO DATA YET")?
#
#   true  = show as "NO DATA YET" placeholder (keeps full mental map visible)
#   false = hide until data appears

show_empty_subprojects: true

# ============================================================================
# Display Customization
# ============================================================================

# Custom display names for subprojects and directories (optional).
# If not listed here, directory names are auto-formatted:
#   underscores become spaces, uppercase applied.
#
# Example:
#   trees_gene_families: "GENE FAMILY TREES"
#   trees_species: "SPECIES TREES"
display_names: {}

# ============================================================================
# File Filtering
# ============================================================================

# Filenames matching these patterns are hidden from the web interface.
# Substring match, case-sensitive.
exclude_file_patterns:
  - ".gitignore"
  - ".DS_Store"
  - ".upload_state.tsv"
  - ".section_metadata.tsv"

# ============================================================================
# SLURM Settings (used by RUN-start_server.sbatch)
# ============================================================================

slurm:
  account: "your_account"
  qos: "your_qos"
  partition: "hpg-default"
  time_hours: 725
  memory_gb: 4
  cpus: 1
  # Email notifications (optional - comment out to disable)
  # mail_user: "your_email@university.edu"

# ============================================================================
# Credits (shown in page footer)
# ============================================================================

credits:
  ai: "Claude Code"
  human: "Eric Edsinger"
