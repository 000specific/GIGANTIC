# ============================================================================
# GIGANTIC DATA SERVER CONFIGURATION
# ============================================================================
#
# Edit this file before starting the server.
#
# To start the server (one canonical command, both local and SLURM):
#   bash RUN-start_server.sh
#
# The driver reads execution_mode below and either runs locally OR self-submits
# to SLURM using the slurm.* settings at the bottom of this file.
# Per gigantic_conventions.md §29.
#
# ============================================================================

# AI: Claude Code | Opus 4.7 (1M context) | 2026 May 26 | Purpose: GIGANTIC data server configuration
# Human: Eric Edsinger

# ============================================================================
# Execution Mode
# ============================================================================
# 'local' — runs the server in the foreground of your current shell.
#           Best for laptops, single-user machines, brief demos.
# 'slurm' — submits the server as a long-running SLURM job. RUN-start_server.sh
#           generates an sbatch wrapper from the slurm.* settings below and
#           submits it. Best for HPC clusters where a long-lived process
#           needs to outlive your shell session.

execution_mode: "local"

# ============================================================================
# Server Settings
# ============================================================================

# Project display name (shown in page header and browser tab)
project_name: "GIGANTIC DATA"

# Server port (change if port is already in use)
port: 9456

# Auto-refresh interval in seconds
# How often the server re-scans each subproject's upload_to_server/ tree.
# The directory tree is cached between refreshes for fast page loads.
refresh_interval_seconds: 300

# ============================================================================
# Subproject Ordering (EXPLICIT LIST — only these are shown)
# ============================================================================
# The landing page shows subprojects in this order.
# Subprojects NOT listed here are not displayed (the server silently ignores
# them even if they have upload_to_server/ data).
#
# This is an explicit allowlist — edit to include/exclude subprojects.

subproject_order:
  # With files (alphabetical) — appear first on landing page
  - annotations_X_ocl
  - annotations_hmms
  - dark_proteomes
  - gene_sizes
  - homolog_counts
  - hotspots
  - orthogroups_X_ocl
  - trees_gene_families
  - trees_gene_groups
  - trees_species
  # Without files yet (alphabetical) — placeholders, "NO DATA YET"
  - gene_sizes_X_ocl
  - ocl_perspectives
  - synteny
  - synteny_X_ocl
  - trees_gene_families_X_ocl
  - trees_gene_groups_X_ocl

# ============================================================================
# Landing Page: Empty Subprojects
# ============================================================================
# If a listed subproject has upload_to_server/ but no files yet, should we
# still show its card on the landing page (dimmed with "NO DATA YET")?
#
#   true  = show as "NO DATA YET" placeholder (keeps full mental map visible)
#   false = hide until data appears

show_empty_subprojects: true

# ============================================================================
# Display Customization
# ============================================================================

# Custom display names for subprojects and directories (optional).
# If not listed here, directory names are auto-formatted:
#   underscores become spaces, uppercase applied.
#
# Example:
#   trees_gene_families: "GENE FAMILY TREES"
#   trees_species: "SPECIES TREES"
display_names: {}

# ============================================================================
# File Filtering
# ============================================================================

# Filenames matching these patterns are hidden from the web interface.
# Substring match, case-sensitive.
exclude_file_patterns:
  - ".gitignore"
  - ".DS_Store"
  - ".upload_state.tsv"
  - ".section_metadata.tsv"

# ============================================================================
# SLURM Settings (used when execution_mode: "slurm")
# ============================================================================
# RUN-start_server.sh reads these and writes a one-shot sbatch wrapper to
# logs/.run_server_<pid>.sbatch before submitting. You do not edit any sbatch
# file directly.

slurm:
  account: "your_account"        # REQUIRED for slurm mode — your HPC account
  qos: "your_qos"                # REQUIRED for slurm mode — your HPC qos
  partition: "hpg-default"
  time_hours: 720
  memory_gb: 4
  cpus: 1

# ============================================================================
# Credits (shown in page footer)
# ============================================================================

credits:
  ai: "Claude Code"
  human: "Eric Edsinger"
