# GIGANTIC env naming convention: aiG-<subproject>-<block_or_step>-<optional_details>
#   subproject       = subprojects/ dir name verbatim
#   block_or_step    = BLOCK_X or STEP_N-X with the BLOCK_/STEP_N- prefix stripped
#   optional_details = workflow-distinguishing suffix used ONLY when sibling
#                      workflow-COPYME-* dirs in the same BLOCK need GENUINELY
#                      different envs. Default = sibling workflows share env.
#
# AI: Claude Code | Opus 4.7 | 2026 May 24
# Human: Eric Edsinger
# ===========================================================================
#
# Per-BLOCK conda env for one_direction_homologs/BLOCK_diamond_ncbi_nr.
# Provides DIAMOND for protein similarity search against NCBI nr, plus
# Python + NextFlow + pyyaml for pipeline orchestration.
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate aiG-one_direction_homologs

name: aiG-one_direction_homologs

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0,<26.0  # PIN: NF 26.x strict-DSL retroactively breaks these workflows; see HANDOFF doc

  # YAML config flattening in RUN-workflow.sh (NextFlow 26.x compatibility)
  - pyyaml

  # NextFlow needs a JVM; older NF builds don't pull it transitively
  - openjdk

  # DIAMOND: fast protein similarity search (~1000x faster than BLAST)
  - diamond>=2.0
