# ============================================================
# QUICK START
# ============================================================
# Each workflow copy validates ONE gene family's RGS file.
# 1. Copy the template:
#    cp -r workflow-COPYME-validate_rgs workflow-RUN_01-validate_rgs
# 2. Edit this config file (set gene_family name and rgs_file)
# 3. Place your RGS FASTA file in INPUT_user/
# 4. Run: bash RUN-workflow.sh

# ============================================================
# GENE FAMILY (EDIT THIS)
# ============================================================

gene_family:
  # Name of the gene family being validated
  name: "innexin_pannexin"

  # Path to the RGS FASTA file (in INPUT_user/)
  # Filename format: rgs_{category}-{species}-{gene_family_details}.aa
  rgs_file: "INPUT_user/rgs_channel-human_worm_fly-innexin_pannexin_channels.aa"

# ============================================================
# PROJECT SETTINGS
# ============================================================

project:
  name: "gene_families"

# ============================================================
# OUTPUT CONFIGURATION
# ============================================================

output:
  base_dir: "OUTPUT_pipeline"
