#
#     bash RUN-workflow.sh
#
# ============================================================================

# GIGANTIC STEP_1 RGS Validation Configuration
# AI: Claude Code | Opus 4.6 | 2026 February 27 | Purpose: User-editable configuration for RGS validation
# Human: Eric Edsinger

# ============================================================
# QUICK START
# ============================================================
# Each workflow copy validates ONE gene family's RGS file.
# 1. Copy the template:
#    cp -r workflow-COPYME-validate_rgs workflow-RUN_01-validate_rgs
# 2. Edit this config file (set gene_family name and rgs_file)
# 3. Place your RGS FASTA file in INPUT_user/
# 4. Run: bash RUN-workflow.sh

# ============================================================
# GENE FAMILY (EDIT THIS)
# ============================================================

gene_family:
  # Name of the gene family being validated
  name: "innexin_pannexin"

  # Path to the RGS FASTA file (in INPUT_user/)
  # Filename format: rgs_{category}-{species}-{gene_family_details}.aa
  rgs_file: "INPUT_user/rgs_channel-human_worm_fly-innexin_pannexin_channels.aa"

# ============================================================
# PROJECT SETTINGS
# ============================================================

project:
  name: "gene_families"

# ============================================================
# OUTPUT CONFIGURATION
# ============================================================

output:
  base_dir: "OUTPUT_pipeline"

# =============================================================================
# Computational Resources
# =============================================================================
# These values are used by BOTH NextFlow (process resources) and SLURM (job resources).
# STEP_1 is lightweight - validation only.

cpus: 1
memory_gb: 4
time_hours: 1

# =============================================================================
# Execution Mode
# =============================================================================
# "local" - Run directly on this machine (default)
# "slurm" - Submit as a SLURM cluster job

execution_mode: "local"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"
