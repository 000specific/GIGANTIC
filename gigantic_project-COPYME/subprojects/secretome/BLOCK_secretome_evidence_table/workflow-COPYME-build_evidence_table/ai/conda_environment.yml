#   conda activate aiG-secretome-build_evidence_table

name: aiG-secretome-build_evidence_table

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python>=3.10
  - nextflow>=23.0,<26.0  # PIN: NF 26.x strict-DSL retroactively breaks these workflows; see HANDOFF doc
  - pyyaml
  - pandas
  - openjdk
