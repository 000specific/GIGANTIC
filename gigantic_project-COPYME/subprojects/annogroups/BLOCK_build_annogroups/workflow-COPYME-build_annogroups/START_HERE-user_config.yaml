# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
#     bash RUN-workflow.sh
#
# ============================================================================
#
# GIGANTIC annogroups - BLOCK_build_annogroups
# AI: Claude Code | Opus 4.8 (1M context) | 2026 June 18
# Human: Eric Edsinger
#
# Builds the four canonical annogroup types — feature, combination, architecture,
# absent — PER SOURCE annotation database, from annotations_hmms outputs. One
# parser plugin per source (ai/scripts/parsers/<source>.py); the four-type
# construction is shared. How many types a source yields (3 or 4) is determined
# by its data, not configured here.

# Species set (drives the proteome universe used for `absent`)
species_set_name: "species70"

# Which annotation sources to build annogroups for.
#   "all"            - every source that has a parser plugin AND data available
#   [ pfam, gene3d ] - an explicit subset (each must have parsers/<source>.py)
# Parser plugins present: pfam, panther (positional -> 4 types) and go (whole-
# protein -> 3 types). "all" auto-includes every parser, so new parsers need no
# edit here.
sources: "all"

# =============================================================================
# GO term origins (parsers/go.py only) — EXPLICIT user decision
# =============================================================================
# GO is not a standalone database; GO terms appear in the raw InterProScan results
# tagged with the tool that contributed them. Choose which origins to include:
#   - InterPro : curated InterPro2GO mapping (already a cross-database
#                consolidation of Pfam/SMART/CDD/... matches). High precision.
#   - PANTHER  : GO assigned directly by PANTHER (largely phylogenetically
#                inferred, GO PAINT/IBA). Higher recall, an inference layer.
# Default = both (the union across tools). Set to [ "InterPro" ] for the curated-
# only, artifact-averse subset. This choice MATERIALLY changes the GO annogroups
# (PANTHER contributes ~56% of GO (protein,term) pairs in this dataset), so it is
# a documented decision, not a silent default.
go_term_origins: [ "InterPro", "PANTHER" ]

# Input paths (relative to this workflow directory), all via output_to_input (§2)
inputs:
  # annotations_hmms output_to_input ROOT; each parser appends its own subpath
  # (e.g. the pfam parser reads BLOCK_interproscan_parsed/pfam/).
  annotations_hmms_dir: "../../../annotations_hmms/output_to_input"

  # GO term ID -> name mapping (parsers/go.py), generated by annotations_hmms from
  # the canonical go-basic.obo. Gives GO annogroups human-readable definitions
  # ('GO term name ==GO:ID'). Unset this to emit bare ==GO:ID.
  go_names_map: "../../../annotations_hmms/output_to_input/GO_reference/go_id_to_name.tsv"

  # Species-set proteomes (the membership universe for `absent`), from genomesDB.
  proteomes_dir: "../../../genomesDB/output_to_input/STEP_4-create_final_species_set/species70_gigantic_T1_proteomes"

  # Species-tree clade->species mapping (from trees_species, ALL structures). Read
  # by Script 004 (species_tree_deconvolution — per-clade member-protein counts for
  # every clade) and Script 006 (composite_clades — see the composite_clades block
  # below). Clade species sets are stable across structures (Rule 6).
  clade_species_mappings: "../../../trees_species/output_to_input/BLOCK_permutations_and_features/Species_Clade_Species_Mappings/9_ai-clade_species_mappings-all_structures.tsv"

  # Curated composite-clades manifest (Script 006) — the user's list of composite
  # clades to report (one per row; see the file's header). Relative to the workflow dir.
  composite_clades_manifest: "INPUT_user/composite_clades_manifest.tsv"

# =============================================================================
# Composite Clades (Script 006)
# =============================================================================
# A "composite clade" is a user-defined question about where an annogroup's member
# species fall on the species tree. This block defines the building-block GROUPS and
# the scope; the composite clades to REPORT are curated in
# INPUT_user/composite_clades_manifest.tsv, where each row picks one ALGORITHM:
#   - exact            : members come from EXACTLY the listed component groups
#   - absent           : members are ABSENT from ALL listed clades
#   - core_urclade     : members in >=1 outgroup of a target clade AND >=1 ingroup
#                        (the target's Ur = last-common-ancestor core)
#   - core_early_clade : members in >=2 ingroups (the target's "Early" window = its
#                        early descendant branches / the species tree's ambiguous nodes)
# Generalizes the earlier hardcoded analysis that fixed the five metazoan clades.
# Edit `groups` to analyze ANY clade grouping; the default is the five metazoan
# clades within Metazoa (these are CLADES, not phyla — Bilateria is a clade).
#   - reference_structure : structure whose clade->species sets to use (Rule 6 stable)
#   - scope_clade_id_name : the scope clade; its display name (e.g. Metazoa) is
#                           usable as a Target_Clade in the manifest, and members
#                           outside it map to the outside_label
#   - outside_label       : name for outside-scope members (a valid exact component)
#   - groups              : each building-block group = a name + the clade_id_names
#                           whose species it unions (group names + the scope name +
#                           any clade_id_name are resolvable in the manifest)
composite_clades:
  reference_structure: "structure_001"
  scope_clade_id_name: "C082_Metazoa"
  outside_label: "NonMetazoa"
  groups:
    - { name: "Ctenophora", clade_id_names: [ "C086_Ctenophora" ] }
    - { name: "Porifera",   clade_id_names: [ "C090_Porifera" ] }
    - { name: "Placozoa",   clade_id_names: [ "C095_Placozoa" ] }
    - { name: "Cnidaria",   clade_id_names: [ "C102_Cnidaria" ] }
    - { name: "Bilateria",  clade_id_names: [ "C103_Bilateria" ] }

# Output configuration
output:
  #   OUTPUT_pipeline/1-output/            sources manifest + proteome universe
  #   OUTPUT_pipeline/2-output/<source>/   annogroup map + membership
  #   OUTPUT_pipeline/3-output/<source>/   validation report
  base_dir: "OUTPUT_pipeline"

# =============================================================================
# Computational Resources (SLURM, when execution_mode is "slurm")
# =============================================================================
# The proteome universe (~1.4M sequences) and per-source membership dominate
# memory; building is dict/set work.
cpus: 4
memory_gb: 24
time_hours: 4

# =============================================================================
# Execution Mode  ("local" runs here; "slurm" self-submits as a SLURM job)
# =============================================================================
execution_mode: "slurm"
slurm_account: "your_account"
slurm_qos: "your_qos"

# =============================================================================
# Parallelism Mode (how per-source tasks dispatch; composes with execution_mode)
#   "local" - per-source tasks run within this allocation (default)
#   "slurm" - each per-source task submits as its own SLURM job
# =============================================================================
parallelism_mode: "local"

# Resume from cached NextFlow work/ (false = re-run from scratch)
resume: false
