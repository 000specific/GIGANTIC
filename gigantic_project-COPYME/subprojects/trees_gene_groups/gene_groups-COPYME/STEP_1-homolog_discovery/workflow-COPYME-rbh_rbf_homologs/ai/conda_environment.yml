# GIGANTIC trees_gene_groups - STEP_1 (RBH/RBF homolog discovery) conda env
# Per-workflow conda env, auto-created from this file on first RUN_1 run by
# RUN-workflow.sh (mamba preferred; conda fallback).
# numpy + scipy are required for the Hungarian optimal-assignment path in
# script 008 (map_rgs_to_reference_genomes.py); without them, 008 falls back
# to a greedy assignment that fails-fast on any residual ambiguity.
name: aiG-trees_gene_groups-rbh_rbf_homologs
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.10
  - pyyaml
  - nextflow
  - blast
  - numpy
  - scipy
