# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
# This is the main configuration file for this workflow.
# Review and update the settings below for your project, then run:
#
#     bash RUN-workflow.sh
#
# ============================================================================

# GIGANTIC STEP_2 Phylogenetic Analysis Configuration
# AI: Claude Code | Opus 4.6 | 2026 March 10 | Purpose: User-editable configuration for phylogenetic analysis
# Human: Eric Edsinger

# ============================================================
# QUICK START
# ============================================================
# Each workflow copy processes ONE gene family.
# 1. Copy the template:
#    cp -r workflow-COPYME-phylogenetic_analysis workflow-RUN_01-phylogenetic_analysis
# 2. Edit this config file (set gene_family name)
# 3. Ensure STEP_1 has completed (AGS files in trees_gene_families/output_to_input/STEP_1-homolog_discovery/)
# 4. Choose tree-building methods below (tree_methods section)
# 5. Run: bash RUN-workflow.sh

# ============================================================
# GENE FAMILY (EDIT THIS)
# ============================================================

gene_family:
  # Name of the gene family being analyzed (must match STEP_1 output)
  name: "innexin_pannexin"

# ============================================================
# INPUT CONFIGURATION
# ============================================================

input:
  # Path to output_to_input directory (relative to this workflow directory)
  # AGS files are found at: <output_to_input_dir>/<gene_family>/STEP_1-homolog_discovery/
  output_to_input_dir: "../../../../output_to_input"

# ============================================================
# PROJECT SETTINGS
# ============================================================

project:
  name: "gene_families"
  database: "speciesN_T1-speciesN"

# ============================================================
# TREE-BUILDING METHODS
# ============================================================
# Enable/disable each tree-building method.
# At least one method must be enabled.

tree_methods:
  # FastTree: Fast approximate ML phylogeny (DEFAULT, RECOMMENDED)
  # Good for: General-purpose phylogenetics, 50-500 sequences
  # Quality: Best approximate ML trees (better log-likelihoods than VeryFastTree)
  # Runtime: Minutes to hours
  fasttree: true

  # IQ-TREE: Full ML phylogeny with model selection and bootstrap
  # Good for: Publication-quality analysis, rigorous statistical support
  # Runtime: Hours to days (depends on dataset size)
  iqtree: false

  # VeryFastTree: Parallelized FastTree replacement
  # Good for: Very large datasets (>10,000 sequences) where threading helps
  # Quality: Slightly worse trees than FastTree at typical GIGANTIC scale
  # Runtime: Similar to FastTree for small datasets, faster for very large ones
  veryfasttree: false

  # PhyloBayes: Bayesian phylogenetic inference (CAT-GTR model)
  # Good for: Bayesian counterpoint to ML methods, deep divergences
  # Quality: Site-heterogeneous models, posterior probability support
  # Runtime: Very slow (days to weeks) - runs 2 MCMC chains + convergence check
  phylobayes: false

# ============================================================
# PHYLOGENETIC TOOL PARAMETERS
# ============================================================

phylogenetics:
  mafft:
    maxiterate: 1000
    reorder: true
    bl: 45
    originalseqonly: true
    threads: 50

  # ClipKit alignment trimming
  clipkit:
    mode: "smart-gap"

  # IQ-TREE parameters (only used when iqtree: true above)
  iqtree:
    model: "MFP"       # Model finder plus (automatic model selection)
    bootstrap: 2000    # Ultrafast bootstrap replicates
    alrt: 2000         # SH-aLRT test replicates
    bnni: true         # Optimize branch lengths
    threads: "AUTO"    # Auto-detect thread count

  # VeryFastTree parameters (only used when veryfasttree: true above)
  veryfasttree:
    threads: 4         # Number of threads (main advantage over FastTree)

  # PhyloBayes parameters (only used when phylobayes: true above)
  phylobayes:
    model: "-cat -gtr"   # CAT-GTR site-heterogeneous model
    generations: 10000   # Total MCMC generations per chain
    burnin: 2500         # Burnin generations to discard
    every: 1             # Save every N generations

# ============================================================
# OUTPUT CONFIGURATION
# ============================================================

output:
  base_dir: "OUTPUT_pipeline"

# =============================================================================
# Per-Tool Computational Resources
# =============================================================================
# NextFlow manages SLURM resources per-process via labels.
# Each tool has its own CPU, memory, and time allocation.
# Adjust based on your dataset size and cluster capabilities.

resources:
  # MAFFT alignment (resource-intensive for large alignments)
  mafft:
    cpus: 50
    memory_gb: 350
    time_hours: 168       # 7 days

  # ClipKit trimming (lightweight)
  clipkit:
    cpus: 4
    memory_gb: 16
    time_hours: 4

  # FastTree (relatively fast, single-threaded)
  fasttree:
    cpus: 4
    memory_gb: 16
    time_hours: 4

  # IQ-TREE (very resource-intensive for model selection + bootstrap)
  iqtree:
    cpus: 50
    memory_gb: 350
    time_hours: 168       # 7 days

  # VeryFastTree (parallelized, moderate resources)
  veryfasttree:
    cpus: 4
    memory_gb: 16
    time_hours: 4

  # PhyloBayes (very slow MCMC, long runtime)
  phylobayes:
    cpus: 4
    memory_gb: 32
    time_hours: 336       # 14 days

  # Visualization (ETE3 rendering)
  visualization:
    cpus: 4
    memory_gb: 16
    time_hours: 2

# =============================================================================
# Execution Mode
# =============================================================================
# "local" - Run directly on this machine (default)
# "slurm" - Submit as a SLURM cluster job

execution_mode: "local"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"
slurm_cpus: 50
slurm_memory_gb: 350
slurm_time_hours: 198

# =============================================================================
# Resume from cached NextFlow work directory
# =============================================================================
# When true, NextFlow re-uses cached results from work/ for unchanged tasks
# (saves time on partial-failure recovery). When false, every task re-runs
# from scratch.
#
# Default: false — stale-cache surprises have caused incorrect results in the
# past, so explicit opt-in is safer for research reproducibility. Flip to true
# when you intentionally want to resume after a known interruption.

resume: false
