# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running RUN-workflow.sh
# ============================================================================
#
# Single user-runnable script for this workflow:
#     bash RUN-workflow.sh
#
# The script:
#   1. Creates the per-workflow conda env once on the login node (if missing).
#      Self-heals if env dir exists but bin/python is missing.
#   2. For every gene group with STEP_2 newick output, creates a
#      gene_group-X/workflow-RUN_01-tree_visualization/ from this COPYME and
#      dispatches the toytree rendering script.
#   3. Dispatches per `execution_mode`:
#        local          - sequential local renders
#        slurm-standard - one sbatch per gene group, standard QOS
#        slurm-burst    - chunked: one sbatch per BLOCK of gene groups, burst QOS
#
# STEP_3 is intentionally lightweight (seconds-to-minutes per render) and
# soft-fail (a render failure writes a placeholder and exits 0).
# Prerequisite: STEP_2 must have produced newicks in
#   ../../../output_to_input/<source>/STEP_2-phylogenetic_analysis/gene_group-*/
# ============================================================================

# ============================================================================
# EXECUTION MODE (EDIT THIS)
# ============================================================================
execution_mode: "local"

# ============================================================================
# GENE-GROUP SOURCE (EDIT THESE)
# ============================================================================
gene_group_source_tsv: "../../../output_to_input/gene_groups-hugo_hgnc/STEP_0-hgnc_gene_groups/3_ai-rgs_generation_summary.tsv"
step2_output_to_input_dir: "../../../output_to_input/gene_groups-hugo_hgnc/STEP_2-phylogenetic_analysis"

# ============================================================================
# OPTIONAL OVERRIDE MANIFEST (LEAVE EMPTY TO USE DEFAULTS)
# ============================================================================
# Manifest lives in the SUBPROJECT-LEVEL INPUT_user dir (gene_groups-hugo_hgnc/
# INPUT_user/), not the COPYME-level dir. From here the relative path is
# "../../INPUT_user/<file>".
#
# gene_groups_manifest: optional override of which gene groups STEP_3 visualizes.
# Independent of STEP_1's and STEP_2's manifests — STEP_3 can target a different
# subset (e.g., the trees you actually want figures for).
#   - Default (empty string OR a manifest whose first data line is 'all'):
#     visualize every row of gene_group_source_tsv that has STEP_2 newicks.
#   - To override: drop a TSV in ../../INPUT_user/ with a single column
#     'sanitized_name' (one sanitized_name per line; '#' = comment). Each value
#     must match a row of gene_group_source_tsv, or the orchestrator fails-fast.
gene_groups_manifest: ""       # e.g. "../../INPUT_user/gene_groups_manifest_step3.tsv"

# ============================================================================
# TIERING (EDIT IF NEEDED)
# ============================================================================
large_threshold: 50

# ============================================================================
# SLURM SETTINGS
# ============================================================================
slurm_account: "moroz"
slurm_qos_standard: "moroz"
slurm_qos_burst: "moroz-b"

# ============================================================================
# PER-TIER RESOURCES (rendering is lightweight; both tiers small)
# ============================================================================
small_cpus: 2
small_memory_gb: 8
small_time_hours: 2
small_time_hours_burst: 12
small_burst_block_size: 50

large_cpus: 2
large_memory_gb: 16
large_time_hours: 4
large_time_hours_burst: 24
large_burst_block_size: 20

# ============================================================================
# ============================================================================
# Below this point: per-gene-group rendering settings.
# These flow through to each gene_group-X/workflow-RUN_01-*/START_HERE-user_config.yaml.
# RUN-workflow.sh sed-patches `gene_family.name` per gene group.
# ============================================================================
# ============================================================================

gene_family:
  name: "PLACEHOLDER"

input:
  output_to_input_dir: "../../../../output_to_input"

visualization:
  show_tip_labels_max_tips: 500
  color_tips_by_species: true
  tip_label_font_size_px: 11
  show_branch_support: true
  branch_support_font_size_px: 7
  canvas_width_px: 1000
  canvas_height_per_tip_px: 20
  canvas_height_min_px: 900

output:
  base_dir: "OUTPUT_pipeline"
