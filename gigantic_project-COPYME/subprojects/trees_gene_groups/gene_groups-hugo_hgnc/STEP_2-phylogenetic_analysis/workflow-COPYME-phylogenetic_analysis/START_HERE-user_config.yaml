# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running RUN-workflow.sh
# ============================================================================
#
# Single user-runnable script for this workflow:
#     bash RUN-workflow.sh
#
# The script:
#   1. Creates the per-workflow conda env once on the login node (if missing)
#   2. For every gene group in `gene_group_source_tsv` that has a STEP_1 AGS:
#      creates a gene_group-X/workflow-RUN_01-phylogenetic_analysis/ directory
#      by copying this COPYME (one level up at STEP_2-phylogenetic_analysis/)
#   3. Dispatches per `execution_mode`:
#        local          - sequential local nextflow runs
#        slurm-standard - one sbatch per gene group, standard QOS
#        slurm-burst    - chunked: one sbatch per BLOCK of gene groups, burst QOS
#
# Prerequisite: STEP_1 must have produced AGS files in
#   ../../../output_to_input/<source>/STEP_1-homolog_discovery/gene_group-*/
# ============================================================================

# ============================================================================
# EXECUTION MODE (EDIT THIS)
# ============================================================================
execution_mode: "slurm-burst"

# ============================================================================
# GENE-GROUP SOURCE (EDIT THESE)
# ============================================================================
# TSV produced by STEP_0 listing gene groups.
gene_group_source_tsv: "../../../output_to_input/gene_groups-hugo_hgnc/STEP_0-hgnc_gene_groups/3_ai-rgs_generation_summary.tsv"

# Where STEP_1's per-gene-group AGS output lives (one .aa per gene group).
step1_output_to_input_dir: "../../../output_to_input/gene_groups-hugo_hgnc/STEP_1-homolog_discovery"

# ============================================================================
# OPTIONAL OVERRIDE MANIFEST (LEAVE EMPTY TO USE DEFAULTS)
# ============================================================================
# Manifest lives in the SUBPROJECT-LEVEL INPUT_user dir (gene_groups-hugo_hgnc/
# INPUT_user/), not the COPYME-level dir. From here the relative path is
# "../../INPUT_user/<file>".
#
# gene_groups_manifest: optional override of which gene groups STEP_2 processes.
# This is independent of STEP_1's manifest — STEP_2 can target a different subset.
#   - Default (empty string OR a manifest whose first data line is 'all'):
#     process every row of gene_group_source_tsv that has a STEP_1 AGS file.
#   - To override: drop a TSV in ../../INPUT_user/ with a single column
#     'sanitized_name' (one sanitized_name per line; '#' = comment). Each value
#     must match a row of gene_group_source_tsv, or the orchestrator fails-fast.
gene_groups_manifest: ""       # e.g. "../../INPUT_user/gene_groups_manifest_step2.tsv"

# ============================================================================
# TIERING (EDIT IF NEEDED)
# ============================================================================
# Gene groups with > large_threshold RGS sequences use the "large" resource tier.
large_threshold: 50

# ============================================================================
# SLURM SETTINGS (EDIT slurm_account FOR YOUR CLUSTER)
# ============================================================================
slurm_account: "moroz"
slurm_qos_standard: "moroz"
slurm_qos_burst: "moroz-b"

# ============================================================================
# PER-TIER RESOURCES
# ============================================================================
# Identical CPU/memory for standard and burst. Burst gets longer time_hours
# to absorb potential preemption. burst_block_size = gene groups per SLURM job
# in slurm-burst mode (jobs in a block run sequentially inside one SLURM job).
small_cpus: 4
small_memory_gb: 16
small_time_hours: 12
small_time_hours_burst: 96
small_burst_block_size: 10

large_cpus: 16
large_memory_gb: 64
large_time_hours: 24
large_time_hours_burst: 168
large_burst_block_size: 3

# ============================================================================
# Resume from cached NextFlow work directory
# ============================================================================
resume: false

# ============================================================================
# ============================================================================
# Below this point: per-gene-group nextflow pipeline settings.
# These flow through to each gene_group-X/workflow-RUN_01-*/START_HERE-user_config.yaml.
# RUN-workflow.sh sed-patches `gene_family.name` per gene group.
# ============================================================================
# ============================================================================

# ============================================================================
# GENE FAMILY (set per-gene-group by the orchestrator at setup time)
# ============================================================================

gene_family:
  name: "PLACEHOLDER"

# ============================================================================
# INPUT CONFIGURATION (per gene group)
# ============================================================================

input:
  # Path to output_to_input directory (relative to per-gene-group workflow-RUN_01).
  # AGS files at: <output_to_input_dir>/gene_groups-hugo_hgnc/STEP_1-homolog_discovery/gene_group-<gene_family>/
  output_to_input_dir: "../../../../output_to_input"

# ============================================================================
# PROJECT SETTINGS
# ============================================================================

project:
  name: "gene_groups"
  database: "species70_T1-species70"

# ============================================================================
# TREE-BUILDING METHODS
# ============================================================================

tree_methods:
  fasttree: true        # DEFAULT, fast approximate ML
  iqtree: false         # Publication-quality ML; very slow
  veryfasttree: false   # Parallelized FastTree alternative
  phylobayes: false     # Bayesian; very slow

# ============================================================================
# PHYLOGENETIC TOOL PARAMETERS
# ============================================================================

phylogenetics:
  mafft:
    maxiterate: 1000
    reorder: true
    bl: 45
    originalseqonly: true
    threads: 50

  clipkit:
    mode: "smart-gap"

  iqtree:
    model: "MFP"
    bootstrap: 2000
    alrt: 2000
    bnni: true
    threads: "AUTO"

  veryfasttree:
    threads: 4

  phylobayes:
    model: "-cat -gtr"
    generations: 10000
    burnin: 2500
    every: 1

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================

output:
  base_dir: "OUTPUT_pipeline"
