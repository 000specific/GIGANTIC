# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
# This is the main configuration file for this workflow.
# Review and update the settings below for your project, then run:
#
#     bash RUN-workflow.sh
#
# ============================================================================

# GIGANTIC trees_species - Permutations and Features Configuration
# AI: Claude Code | Opus 4.6 | 2026 March 04
# Human: Eric Edsinger

# ============================================================================
# Species Set
# ============================================================================
# Identifier for this species set (used in output directory and file naming)
# Examples: "speciesN", "species71", "speciesN"
species_set_name: "species71"

# ============================================================================
# Input Files (relative to this workflow directory)
# ============================================================================
input_files:
  # Species tree in Newick format with clade IDs and names
  # Format: ((C001_Fonticula_alba:1.0,...)C068_Basal:1.0
  # Each node labeled as CXXX_Clade_Name
  species_tree: "INPUT_user/species_tree.newick"

  # Optional: Clade ID to human-readable name mapping (TSV)
  # Format: Clade_ID<TAB>Clade_Name
  # If not provided, names are extracted from the Newick tree
  clade_names: ""

# ============================================================================
# Permutation Configuration
# ============================================================================
permutation:
  # List of clade names whose branching order is unresolved
  # The pipeline generates all (2N-3)!! possible arrangements
  # For N=5 clades: 105 topologies (each becomes one structure_NNN)
  # For N=0 or 1 clade: No permutation (single species tree mode — the input
  #   species tree is already resolved, so the pipeline produces one structure_001
  #   identical to the input)
  #
  # These must match clade names in the input Newick species tree exactly
  unresolved_clades:
    - Ctenophora
    - Porifera
    - Placozoa
    - Cnidaria
    - Bilateria

# ============================================================================
# Output Configuration
# ============================================================================
output:
  # Main output directory (relative to this workflow directory)
  base_dir: "OUTPUT_pipeline"

# =============================================================================
# Computational Resources
# =============================================================================
# These values are used by SLURM (job resources) when execution_mode is "slurm".
# This BLOCK is light: serial Python scripts, no heavy computation.

cpus: 1
memory_gb: 4
time_hours: 1

# =============================================================================
# Execution Mode
# =============================================================================
# "local" - Run directly on this machine (default)
# "slurm" - Submit as a SLURM cluster job

execution_mode: "local"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"

# =============================================================================
# Resume from cached NextFlow work directory
# =============================================================================
# When true, NextFlow re-uses cached results from work/ for unchanged tasks
# (saves time on partial-failure recovery). When false, every task re-runs
# from scratch.
#
# Default: false — stale-cache surprises have caused incorrect results in the
# past, so explicit opt-in is safer for research reproducibility. Flip to true
# when you intentionally want to resume after a known interruption.

resume: false
