# AI: Claude Code | Opus 4.6 | 2026 March 06 | Purpose: OrthoHMM pipeline configuration
# Human: Eric Edsinger

# Project settings
project:
  name: "my_project"

# Input paths (relative to workflow root directory)
inputs:
  # Proteomes directory from genomesDB STEP_4
  proteomes_dir: "../../../genomesDB/output_to_input/STEP_4-create_final_species_set/speciesN_gigantic_T1_proteomes"

# Output settings
output:
  base_dir: "OUTPUT_pipeline"

# OrthoHMM parameters
# REQUIRED: You MUST set cpus and memory before running.
# The pipeline will fail with a clear error if these are not set.
orthohmm:
  # cpus: 100             # <-- UNCOMMENT AND SET: number of CPU cores to use
  # memory: "750 GB"      # <-- UNCOMMENT AND SET: RAM available for OrthoHMM
  evalue: "0.0001"
  single_copy_threshold: "0.5"

# Conda environment
conda:
  environment: "ai_gigantic_orthogroups_orthohmm"
