# =============================================================================
# Clustering Comparison Pipeline Configuration
# =============================================================================

# Input manifest (relative to this workflow directory)
# The manifest lists clustering runs to compare.
# See INPUT_user/clustering_manifest_example.tsv for format and examples.
manifest: "INPUT_user/clustering_manifest.tsv"

# Project name (used in run log)
project_name: "GIGANTIC"

# Pairwise overlap analysis sampling
# Higher values = more accurate overlap estimates, but slower.
# 500000 is a good default. Reduce to 100000 for faster exploratory runs.
overlap_sample_size: 500000

# =============================================================================
# Resume from cached NextFlow work directory
# =============================================================================
# When true, NextFlow re-uses cached results from work/ for unchanged tasks
# (saves time on partial-failure recovery). When false, every task re-runs
# from scratch.
#
# Default: false — stale-cache surprises have caused incorrect results in the
# past, so explicit opt-in is safer for research reproducibility. Flip to true
# when you intentionally want to resume after a known interruption.

resume: false
