# GIGANTIC env naming convention: aiG-<subproject>-<block_or_step>-<optional_details>
#   subproject       = subprojects/ dir name verbatim
#   block_or_step    = BLOCK_X or STEP_N-X with the BLOCK_/STEP_N- prefix stripped
#   optional_details = workflow-distinguishing suffix used ONLY when sibling
#                      workflow-COPYME-* dirs in the same BLOCK need GENUINELY
#                      different envs. Default = sibling workflows share env.
#
# AI: Claude Code | Opus 4.7 | 2026 May 24
# Human: Eric Edsinger
# ===========================================================================
#
# Tool-shared conda env for OrthoHMM-based orthogroup detection.
# Shared by BLOCK_orthohmm and BLOCK_orthohmm_GIGANTIC ( both invoke the
# same orthohmm tool with different parameterizations ).
#
# Python pinned <3.12 because OrthoHMM uses distutils ( removed in 3.12+ ).
# setuptools provides the distutils shim that OrthoHMM imports.
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate aiG-orthogroups-orthohmm

name: aiG-orthogroups-orthohmm

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11,<3.12
  - setuptools           # distutils shim for OrthoHMM (removed in py 3.12+)
  - nextflow>=23.0

  # YAML config flattening in RUN-workflow.sh (NextFlow 26.x compatibility)
  - pyyaml

  # External tools OrthoHMM invokes
  - hmmer        # profile HMM searches
  - mcl          # graph-based clustering
  - diamond      # initial pairwise sequence comparison

  # OrthoHMM (pip-only, not in conda channels)
  - pip
  - pip:
    - orthohmm
