# GIGANTIC env naming convention: aiG-<subproject>-<block_or_step>-<optional_details>
#   subproject       = subprojects/ dir name verbatim
#   block_or_step    = BLOCK_X or STEP_N-X with the BLOCK_/STEP_N- prefix stripped
#   optional_details = workflow-distinguishing suffix used ONLY when sibling
#                      workflow-COPYME-* dirs in the same BLOCK need GENUINELY
#                      different envs. Default = sibling workflows share env.
#
# AI: Claude Code | Opus 4.7 | 2026 May 24
# Human: Eric Edsinger
# ===========================================================================
#
# Tool-shared conda env for OrthoFinder-based orthogroup detection.
# Shared by BLOCK_orthofinder and BLOCK_orthofinder_array ( same tool,
# single-job vs SLURM-array invocation styles ).
#
# OrthoFinder bundles its own Diamond aligner internally + uses FastTree for
# gene-tree inference. The bioconda orthofinder package pulls those in.
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate aiG-orthogroups-orthofinder

name: aiG-orthogroups-orthofinder

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0

  # YAML config flattening in RUN-workflow.sh (NextFlow 26.x compatibility)
  - pyyaml

  # OrthoFinder (bundles Diamond + uses FastTree internally; bioconda pulls deps)
  - orthofinder
