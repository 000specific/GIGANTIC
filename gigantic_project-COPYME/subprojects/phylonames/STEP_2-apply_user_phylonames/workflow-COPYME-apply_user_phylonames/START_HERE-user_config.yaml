# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
# This is the main configuration file for this workflow.
# Review and update the settings below for your project, then run:
#
#     bash RUN-workflow.sh
#
# ============================================================================

# GIGANTIC Phylonames Workflow Configuration - STEP 2: Apply User Phylonames
# AI: Claude Code | Opus 4.6 | 2026 March 04
# Human: Eric Edsinger
#
# ============================================================================
# HOW TO USE THIS FILE
# ============================================================================
#
# This configuration file controls how the STEP 2 phylonames workflow runs.
# STEP 2 applies your custom phylonames to override the NCBI-generated
# phylonames from STEP 1.
#
# BEFORE RUNNING:
# 1. Run STEP 1 first to generate initial phylonames
# 2. Review the STEP 1 taxonomy summary to identify species needing overrides
# 3. Create your user_phylonames.tsv file in INPUT_user/
# 4. Edit settings below, then run: bash RUN-workflow.sh
#
# ============================================================================

# ============================================================================
# PROJECT SETTINGS (EDIT THESE)
# ============================================================================

project:
  # Your project name (MUST match the name used in STEP 1)
  name: "my_project"

  # Path to STEP 1 mapping (usually no need to change this)
  # This reads from the subproject output_to_input/ (GIGANTIC inter-STEP convention)
  step1_mapping: "../../output_to_input/STEP_1-generate_and_evaluate/maps"

  # Path to your user-provided custom phylonames
  # Format: TSV file with columns: genus_species<TAB>custom_phyloname
  #
  # Example lines:
  #   Monosiga_brevicollis_MX1<TAB>Holozoa_Choanozoa_Choanoflagellata_Craspedida_Salpingoecidae_Monosiga_brevicollis_MX1
  #   Chromosphaera_perkinsii<TAB>Holozoa_Ichthyosporea_Ichthyophonida_Chromosphaera_perkinsii
  user_phylonames: "INPUT_user/user_phylonames.tsv"

  # Whether to mark user-provided clades with "UNOFFICIAL" suffix
  # Default: true - ALL user-provided clades that differ from NCBI get marked UNOFFICIAL
  # Set to false if you want clean phylonames without the suffix
  #
  # WHY UNOFFICIAL?
  # Assigning a clade to a species is a taxonomic DECISION point.
  # NCBI made their decision; when you override it, YOUR decision is "unofficial"
  # even if the clade name itself exists in NCBI taxonomy.
  # This maintains transparency about data sources.
  mark_unofficial: true

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================

output:
  # Main output directory for generated files
  base_dir: "OUTPUT_pipeline"

# ============================================================================
# SLURM SETTINGS (FOR HPC USERS)
# ============================================================================

slurm:
  # Enable SLURM job submission
  enabled: false

  # SLURM account to charge
  account: "your_account"

  # SLURM Quality of Service
  qos: "your_qos"

  # Resource allocation (STEP 2 is lightweight)
  memory: "8gb"
  time: "0:30:00"
  cpus: 2

# ============================================================================
# NOTES
# ============================================================================
#
# USER PHYLONAMES FORMAT:
#
# Your user_phylonames.tsv should be a tab-separated file:
#   genus_species<TAB>custom_phyloname
#
# Each custom_phyloname follows the standard GIGANTIC format:
#   Kingdom_Phylum_Class_Order_Family_Genus_species
#
# Example file contents:
#   Monosiga_brevicollis_MX1	Holozoa_Choanozoa_Choanoflagellata_Craspedida_Salpingoecidae_Monosiga_brevicollis_MX1
#   Salpingoeca_rosetta	Holozoa_Choanozoa_Choanoflagellata_Craspedida_Salpingoecidae_Salpingoeca_rosetta
#   Chromosphaera_perkinsii	Holozoa_Ichthyosporea_Ichthyophonida_Chromosphaeraceae_Chromosphaera_perkinsii
#
# UNOFFICIAL MARKING:
#
# When mark_unofficial is true (default), clades that DIFFER from the NCBI
# phyloname get an "UNOFFICIAL" suffix:
#
#   NCBI output:    Kingdom6555_Phylum6554_Choanoflagellata_Craspedida_Salpingoecidae_Monosiga_brevicollis_MX1
#   User provides:  Holozoa_Choanozoa_Choanoflagellata_Craspedida_Salpingoecidae_Monosiga_brevicollis_MX1
#   Final output:   HolozoaUNOFFICIAL_ChoanozoaUNOFFICIAL_Choanoflagellata_Craspedida_Salpingoecidae_Monosiga_brevicollis_MX1
#
# Only Holozoa and Choanozoa get marked because they replaced the numbered clades.
# Choanoflagellata, Craspedida, Salpingoecidae remain unmarked (they match NCBI).
#
# Set mark_unofficial: false if you want clean phylonames without the suffix.
#

# =============================================================================
# Resume from cached NextFlow work directory
# =============================================================================
# When true, NextFlow re-uses cached results from work/ for unchanged tasks
# (saves time on partial-failure recovery). When false, every task re-runs
# from scratch.
#
# Default: false — stale-cache surprises have caused incorrect results in the
# past, so explicit opt-in is safer for research reproducibility. Flip to true
# when you intentionally want to resume after a known interruption.

resume: false
