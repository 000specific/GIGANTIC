# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
# This is the main configuration file for this workflow.
# Review and update the settings below for your project, then run:
#
#     bash RUN-workflow.sh
#
# ============================================================================

# AI: Claude Code | Opus 4.6 | 2026 March 10 | Purpose: InterProScan pipeline configuration
# Human: Eric Edsinger

# =============================================================================
# InterProScan Pipeline Configuration
# =============================================================================

# Project name (used in run log naming)
project_name: "my_project"

# Path to InterProScan installation directory (user must set this)
interproscan_install_path: "/path/to/interproscan"

# Number of sequences per chunk for parallel processing
chunk_size: 1000

# InterProScan analysis applications to run ("all" uses all available databases)
applications: "all"

# =============================================================================
# Computational Resources
# =============================================================================
# These values are used by BOTH NextFlow (process resources) and SLURM (job resources).
# Adjust based on your system's available resources.

cpus: 25
memory_gb: 187
time_hours: 96

# =============================================================================
# Execution Mode
# =============================================================================
# "local" - Run directly on this machine (default)
# "slurm" - Submit as a SLURM cluster job

execution_mode: "local"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"
