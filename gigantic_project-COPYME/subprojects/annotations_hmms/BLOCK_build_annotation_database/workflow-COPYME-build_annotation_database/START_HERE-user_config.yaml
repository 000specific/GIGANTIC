# =============================================================================
# Annotation Database Build Pipeline Configuration
# =============================================================================
# Integrates results from all annotation tools (InterProScan, DeepLoc, SignalP,
# TMbed, metapredict) into a unified annotation database per species.

# Project name (used in run log naming)
project_name: "my_project"

# URL for Gene Ontology OBO file download
go_ontology_url: "http://purl.obolibrary.org/obo/go/go-basic.obo"

# Number of days to cache the GO ontology file before re-downloading
go_ontology_cache_days: 30

# Proteomes directory (FASTA files for GIGANTIC species)
# Used by parser scripts 003-007 to identify unannotated proteins per database.
# Default follows GIGANTIC convention: genomesDB output_to_input.
# Set to empty string "" to skip unannotated protein identification.
proteomes_dir: "../../../../genomesDB-species70/output_to_input/STEP_4-create_final_species_set/species70_gigantic_T1_proteomes"

# Species set name (for documentation and output file naming)
species_set_name: "species70"

# Clade comparison groups for annotation enrichment analysis
# Define phylogenetic groups to compare annotation frequencies across clades
# Each group has a name and a list of species (genus_species format)
clade_comparison:
  - group_name: "ctenophora"
    species:
      - "Mnemiopsis_leidyi"
      - "Hormiphora_californensis"
      - "Bolinopsis_microptera"
  - group_name: "cnidaria"
    species:
      - "Nematostella_vectensis"
      - "Hydra_vulgaris"
  - group_name: "bilateria_outgroups"
    species:
      - "Homo_sapiens"
      - "Drosophila_melanogaster"
      - "Caenorhabditis_elegans"

# =============================================================================
# Computational Resources
# =============================================================================
# These values are used by BOTH NextFlow (process resources) and SLURM (job resources).
# The build pipeline is mostly lightweight parsing; adjust if processing very large datasets.

cpus: 1
memory_gb: 16
time_hours: 8

# =============================================================================
# Execution Mode
# =============================================================================
# "local" - Run directly on this machine (default)
# "slurm" - Submit as a SLURM cluster job

execution_mode: "local"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"
