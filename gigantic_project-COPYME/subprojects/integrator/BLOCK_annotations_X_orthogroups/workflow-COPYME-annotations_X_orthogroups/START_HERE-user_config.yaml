# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
# This is the main configuration file for this workflow.
# Review and update the settings below for your project, then run:
#
#     bash RUN-workflow.sh
#
# ============================================================================
#
# GIGANTIC integrator - BLOCK_annotations_X_orthogroups
# AI: Claude Code | Opus 4.8 (1M context) | 2026 June 09
# Human: Eric Edsinger
#
# Integrates pfam ANNOGROUPS (annotation groups) with ORTHOGROUPS, focused on
# orthogroups present in non-bilaterian metazoans but absent from bilaterians.
#
# A QUALIFYING orthogroup has ZERO bilaterian members AND at least one
# non-bilaterian metazoan member (non-metazoan / unicellular outgroup members are
# allowed to ride along; orthogroups made of only non-metazoan unicells do NOT
# qualify, just like bilaterian-containing orthogroups).
#
# Produces two tables:
#   Table 1 (one row per annogroup): annogroups that include at least one
#           qualifying orthogroup are kept; all orthogroups of a kept annogroup
#           are reported regardless of their composition.
#   Table 2 (one row per orthogroup): qualifying orthogroups.
#
# The annogroup<->orthogroup link is SHARED MEMBER PROTEINS (full GIGANTIC IDs).
# This is a structure-independent integration (no per-structure fan-out):
# annogroup membership, orthogroup membership, and the Bilateria species set are
# all invariant across the 105 species-tree structures.

# Run identification
# run_label names the output_to_input subdirectory for this integration run.
# Convention: mirror the annotation database + orthogroup tool being integrated.
run_label: "species70_pfam_X_OrthoHMM"

# Species set identifier (must match the upstream annogroup + orthogroup subprojects)
species_set_name: "species70"

# Annotation source the annogroups were built from. This is the annogroups
# subproject SOURCE name and selects which per-source annogroup set to integrate.
annotation_database: "pfam"

# Annogroup TYPES to include (the annogroups subproject's four-type framework).
# Unlike OCL (an origin engine, where 'absent' is meaningless), the integrator is
# a STATE intersection: 'absent' (pfam-dark proteins) is an accurate per-sequence
# STATE and intersecting it with orthogroups is useful (e.g. qualifying orthogroups
# made of pfam-dark proteins -- "dark orthogroups"). So 'absent' IS included here.
# Note: the absent row is a single large row spanning many orthogroups -- a state
# summary, not a per-origin row.
annogroup_types:
  - "feature"
  - "combination"
  - "architecture"
  - "absent"

# Input paths (relative to this workflow directory)
inputs:
  # Annogroups (the Table 1 spine) imported DIRECTLY from the annogroups
  # subproject output_to_input ROOT (BLOCK_build_annogroups). The per-source
  # files (structure-independent) are read from:
  #   <annogroups_dir>/<species_set_name>/<annotation_database>/
  #     2_ai-<source>-annogroup_map.tsv         (type, accessions, definitions)
  #     2_ai-<source>-annogroup_membership.tsv  (member Sequence_IDs per annogroup)
  annogroups_dir: "../../../annogroups/output_to_input/BLOCK_build_annogroups"

  # Orthogroups (the Table 2 spine). Headerless TSV: OG_ID then tab-delimited
  # member full GIGANTIC IDs. Each member's species comes from its -n_<phyloname>.
  orthogroups_file: "../../../orthogroups/output_to_input/BLOCK_orthohmm_GIGANTIC/orthogroups_gigantic_ids.tsv"

  # Clade species sets (from trees_species). A clade_id_name resolves to its
  # descendant species. Two clades drive the species 3-way classification:
  #   - Bilateria (C103): bilaterian species
  #   - Metazoa   (C082): all metazoan species
  # => non-bilaterian metazoan = in Metazoa but NOT in Bilateria
  #    non-metazoan (unicell outgroup) = NOT in Metazoa
  # A qualifying orthogroup has ZERO bilaterians AND >=1 non-bilaterian metazoan
  # (non-metazoan members allowed; unicell-only orthogroups do NOT qualify).
  clade_species_mappings: "../../../trees_species/output_to_input/BLOCK_permutations_and_features/Species_Clade_Species_Mappings/9_ai-clade_species_mappings-all_structures.tsv"
  bilateria_clade_id_name: "C103_Bilateria"
  metazoa_clade_id_name: "C082_Metazoa"
  clade_reference_structure: "structure_001"

# Output configuration
output:
  # Main output directory (relative to this workflow directory).
  #   OUTPUT_pipeline/1-output/  orthogroup species-composition classification
  #   OUTPUT_pipeline/2-output/  Table 2 (qualifying non-bilaterian-metazoan orthogroups)
  #   OUTPUT_pipeline/3-output/  Table 1 (annogroups X orthogroups)
  #   OUTPUT_pipeline/4-output/  validation report
  base_dir: "OUTPUT_pipeline"

# =============================================================================
# Computational Resources
# =============================================================================
# Used by SLURM (job resources) when execution_mode is "slurm". This is light,
# mostly-serial Python (dict joins over the orthogroup + annogroup tables);
# the orthogroup protein->orthogroup map dominates memory.

cpus: 3
memory_gb: 32
time_hours: 4

# =============================================================================
# Execution Mode
# =============================================================================
# Controls where RUN-workflow.sh itself runs (the NextFlow driver).
#   "local" - Run directly on this machine
#   "slurm" - Self-submit as a SLURM job (driver runs on a compute node)

execution_mode: "slurm"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"

# =============================================================================
# Parallelism Mode
# =============================================================================
# How NextFlow dispatches processes (composes with execution_mode). This BLOCK
# has no per-structure fan-out (a handful of singleton processes), so "local" is
# the natural choice.
#   "local" - processes run within this allocation/machine
#   "slurm" - each process submits as its own SLURM job

parallelism_mode: "local"

# =============================================================================
# Resume from cached NextFlow work directory
# =============================================================================
# false (default) re-runs every task from scratch — safer for reproducibility.
# true re-uses cached results for unchanged tasks (partial-failure recovery).

resume: false
