# GIGANTIC integrator - BLOCK_species_X_all_annotations environment
# AI: Claude Code | Opus 4.8 (1M context) | 2026 June 28
# Human: Eric Edsinger
# ====================================================================
#
# Per-BLOCK conda env scoped to BLOCK_species_X_all_annotations.
# Created on-demand by RUN-workflow.sh via mamba (conda fallback).
#
# Pure-Python integration BLOCK (no external aligners/search tools) — it joins
# the per-species proteome spine with every per-gene feature GIGANTIC produces
# (gene_sizes, hotspots, nr hits, annotations_hmms, annogroups, orthogroups,
# secretome, AGS membership, dark proteome) and, per species-tree structure,
# the orthogroup + annogroup OCL inference. Dependencies are intentionally minimal.
#
# INSTALLATION:
#   The env is created automatically on first run via RUN-workflow.sh.
#   Manual creation:
#     mamba env create -f ai/conda_environment.yml
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate aiG-integrator-species_X_all_annotations

name: aiG-integrator-species_X_all_annotations

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0,<26.0  # PIN: NF 26.x strict-DSL retroactively breaks these workflows (see reference_nextflow_version_pin)

  # Configuration parsing
  - pyyaml
