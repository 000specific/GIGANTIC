# GIGANTIC homolog_counts workflow — user-editable config
# Edit this file before running RUN-workflow.sh.
#
# Path style:
#   Inputs use relative paths to sibling subprojects' output_to_input/ directories.
#   From this workflow's location, ../../../<subproject>/output_to_input/...
#   matches the orthohmm convention.

project:
  name: "homolog_counts"

# Execution mode: "local" (run pipeline here, in this shell)
#                 "slurm" (RUN-workflow.sh self-submits as a SLURM job)
execution_mode: "local"

# Resource sizing — used both by the SLURM job allocation (when execution_mode
# is "slurm") AND by NextFlow's local executor concurrency cap. This workflow
# is lightweight (TSV / FASTA parsing + counting); defaults are comfortable.
cpus: 4
memory_gb: 16
time_hours: 4

# SLURM-specific (ignored when execution_mode is "local")
slurm_account: ""    # <-- EDIT before running with execution_mode: slurm
slurm_qos: ""        # <-- EDIT before running with execution_mode: slurm

inputs:
  # Paths are relative to this workflow directory:
  #   subprojects/homolog_counts/BLOCK_homolog_counts/workflow-COPYME-homolog_counts/
  # so ../../../<subproject>/output_to_input/... reaches sibling subprojects.

  # species70 canonical phyloname map (genus_species | phyloname | phyloname_taxonid)
  # The species70 alphabetical column order in all count TSVs is derived from
  # the `phyloname` column of this file (sorted alphabetically by phyloname).
  species70_phyloname_map: "../../../phylonames/output_to_input/STEP_1-generate_and_evaluate/maps/species70_map-genus_species_X_phylonames.tsv"

  # Upstream subproject output_to_input/ directories
  orthogroups_orthohmm_dir: "../../../orthogroups/output_to_input/BLOCK_orthohmm"
  trees_gene_groups_dir:   "../../../trees_gene_groups/output_to_input/gene_groups-hugo_hgnc"
  trees_gene_families_dir: "../../../trees_gene_families/output_to_input"

output:
  base_dir: "OUTPUT_pipeline"

resume: false
