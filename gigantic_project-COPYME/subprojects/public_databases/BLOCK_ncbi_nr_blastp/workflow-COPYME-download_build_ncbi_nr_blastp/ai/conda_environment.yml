# GIGANTIC env naming convention: aiG-<subproject>-<block_or_step>-<optional_details>
#   subproject       = subprojects/ dir name verbatim
#   block_or_step    = BLOCK_X or STEP_N-X with the BLOCK_/STEP_N- prefix stripped
#   optional_details = workflow-distinguishing suffix used ONLY when sibling
#                      workflow-COPYME-* dirs in the same BLOCK need GENUINELY
#                      different envs. Default = sibling workflows share env.
#
# AI: Claude Code | Opus 4.7 | 2026 May 24
# Human: Eric Edsinger
# ===========================================================================
#
# Subproject-shared conda env used by BOTH public_databases BLOCKs:
#   BLOCK_ncbi_nr_blastp  (makeblastdb-based BLAST DB)
#   BLOCK_ncbi_nr_diamond (diamond-based DIAMOND DB)
# Each BLOCK has an identical copy of this yml in its own ai/ so each is
# self-installable; whichever runs first auto-creates the env, the other
# reuses it.
#
# Provides every tool either BLOCK can invoke:
#   - blast    ( BLOCK_ncbi_nr_blastp:  makeblastdb / blastdbcmd )
#   - diamond  ( BLOCK_ncbi_nr_diamond: diamond makedb )
#   - wget     ( both BLOCKs: download nr.gz from NCBI )
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate aiG-public_databases

name: aiG-public_databases

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0,<26.0  # PIN: NF 26.x strict-DSL retroactively breaks these workflows; see HANDOFF doc

  # YAML config flattening in RUN-workflow.sh (NextFlow 26.x compatibility)
  - pyyaml

  # NextFlow needs a JVM; older NF builds don't pull it transitively
  - openjdk

  # Database building
  - diamond>=2.1
  - blast>=2.14

  # NCBI nr download
  - wget
