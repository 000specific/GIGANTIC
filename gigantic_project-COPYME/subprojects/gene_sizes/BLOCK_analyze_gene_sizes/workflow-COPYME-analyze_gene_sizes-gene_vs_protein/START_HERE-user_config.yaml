# GIGANTIC gene_sizes - Analyze Gene Sizes Configuration
# AI: Claude Code | Opus 4.6 | 2026 March 04
# Human: Eric Edsinger
#
# ============================================================================
# HOW TO USE THIS FILE
# ============================================================================
#
# This configuration file controls how the gene_sizes workflow runs.
# Edit the paths below to match your project setup.
#
# After editing, run: bash RUN-workflow.sh
#
# ============================================================================

# ============================================================================
# INPUT PATHS (EDIT THESE)
# ============================================================================

inputs:
  # Path to INPUT_user/ directory containing per-species gene structure TSV files.
  # This is the Tier 2 (gene_vs_protein) workflow — files must follow the
  # 9-column Tier 2 layout:
  #   Source_Gene_ID  Seqid  Gene_Start  Gene_End  Strand  Gene_Size
  #   CDS_Intervals  CDS_Size  Protein_Size
  # Filename pattern: Genus_species-gene_coordinates_gene_vs_protein.tsv
  # The user creates these files by parsing species-specific GFF/GTF
  # annotations (see research_notebook/research_user/<speciesN>/gene_coordinates/
  # for canonical NCBI / Kim_2025 / repository extractors). Every species with
  # extractable gene + CDS records qualifies for Tier 2; Tier 1 species are
  # also written here (superset overlap), so this tier covers the broadest
  # species set on the universally-comparable metric subset.
  input_user_dir: "INPUT_user"

  # Path to GIGANTIC species list (all species in the species set)
  # One species name per line (Genus_species format)
  # From genomesDB: output_to_input/STEP_4-create_final_species_set/speciesN_gigantic_species_list/species_list.txt
  gigantic_species_list: "INPUT_user/gigantic_species_list.txt"

  # Path to directory containing GIGANTIC proteome files for ID linkage (optional)
  # Files named: Genus_species.aa (symlinks or copies)
  # If provided, Source_Gene_IDs are linked to GIGANTIC identifiers via g_ prefix
  # Leave empty to skip ID linkage
  proteome_dir: ""

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================

output:
  # Main output directory
  base_dir: "OUTPUT_pipeline"

# Optional project name used in run-log labelling (script 005). Leave empty
# unless you want a specific identifier in ai/logs/run_*.log files.
project_name: ""

# =============================================================================
# Computational Resources
# =============================================================================
# These values are used by SLURM (job resources) when execution_mode is "slurm".

cpus: 4
memory_gb: 16
time_hours: 4

# =============================================================================
# Execution Mode
# =============================================================================
# Controls where RUN-workflow.sh itself runs (the NextFlow driver).
#   "local" - Run directly on this machine
#   "slurm" - Self-submit as a SLURM job (driver runs on a compute node)

execution_mode: "local"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"

# ============================================================================
# NOTES
# ============================================================================
#
# WORKFLOW PURPOSE:
# Compute Tier 2 (gene_vs_protein) gene structure metrics from user-provided
# 9-column gene-coordinate TSVs. This is the broad-coverage tier covering
# every species with extractable gene + CDS records — including all Tier 1
# species (superset overlap). Use Tier 2 when only the universally-comparable
# metrics matter; use the parallel Tier 1 (all_inclusive) workflow when you
# need transcript / intron / UTR / exon-count metrics.
#
# HOW IT WORKS:
# 1. Script 001 validates 9-col Tier 2 TSVs against the GIGANTIC species set
#    - Species with valid data: PROCESSED
#    - Species without files: SKIPPED_NO_DATA
#    - Species with incomplete files: SKIPPED_INCOMPLETE
# 2. Script 002 reads gene + CDS intervals and computes per-gene metrics
#    (gene size, CDS size, protein size, CDS segment count). Optionally links
#    Source_Gene_IDs to GIGANTIC identifiers via proteome. Tier 2 deliberately
#    omits transcript / intron / UTR / exon metrics because the underlying
#    annotations don't reliably support them.
# 3. Script 003 computes genome-wide statistics and 4 relative ranks per species
# 4. Script 004 compiles a cross-species 4-metric summary with processing status
# 5. Script 005 writes a timestamped run-success log to ai/logs/
#
# USER INPUT FORMAT (9 columns, Tier 2):
#   One TSV per species in INPUT_user/, named
#   Genus_species-gene_coordinates_gene_vs_protein.tsv:
#
#   Source_Gene_ID  Seqid  Gene_Start  Gene_End  Strand  Gene_Size
#   CDS_Intervals  CDS_Size  Protein_Size
#
#   Source_Gene_ID:   Must match the g_ field in GIGANTIC proteome headers
#   CDS_Intervals:    Comma-separated start-end pairs for the T1 transcript's CDS features
#   Pre-computed Gene_Size / CDS_Size / Protein_Size are conveniences —
#   script 002 re-derives them from the intervals to stay self-consistent.
#
# METRICS COMPUTED (Tier 2 — 4 metrics, biologically-correct, per-gene):
#   Gene_Size            - Genomic span (gene_end - gene_start + 1)
#   CDS_Size             - Length of protein-coding region = sum of merged CDS intervals
#   Protein_Size         - Estimated amino acids = CDS_Size / 3
#   CDS_Segment_Count    - Number of merged CDS intervals (coarse proxy for exon count)
#
# Overlapping intervals (e.g., from collapsed isoforms in user input) are merged before computing metrics.
#
# OUTPUT STRUCTURE:
#   output_to_input/BLOCK_analyze_gene_sizes/gene_vs_protein/speciesN_gigantic_gene_metrics/        - Per-species ranked metrics
#   output_to_input/BLOCK_analyze_gene_sizes/gene_vs_protein/speciesN_gigantic_gene_sizes_summary/  - Cross-species summary
#
# Where N = count of Tier 2 processable species (typically ~64).
#

# =============================================================================
# Resume from cached NextFlow work directory
# =============================================================================
# When true, NextFlow re-uses cached results from work/ for unchanged tasks
# (saves time on partial-failure recovery). When false, every task re-runs
# from scratch.
#
# Default: false — stale-cache surprises have caused incorrect results in the
# past, so explicit opt-in is safer for research reproducibility. Flip to true
# when you intentionally want to resume after a known interruption.

resume: false
