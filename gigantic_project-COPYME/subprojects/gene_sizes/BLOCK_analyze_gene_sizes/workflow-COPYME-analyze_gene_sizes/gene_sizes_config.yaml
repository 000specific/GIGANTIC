# GIGANTIC gene_sizes - Analyze Gene Sizes Configuration
# AI: Claude Code | Opus 4.6 | 2026 March 04
# Human: Eric Edsinger
#
# ============================================================================
# HOW TO USE THIS FILE
# ============================================================================
#
# This configuration file controls how the gene_sizes workflow runs.
# Edit the paths below to match your project setup.
#
# After editing, run: bash RUN-workflow.sh
#
# ============================================================================

# ============================================================================
# INPUT PATHS (EDIT THESE)
# ============================================================================

inputs:
  # Path to INPUT_user/ directory containing per-species gene structure TSV files
  # Each file: Genus_species-gene_coordinates.tsv with columns:
  #   Source_Gene_ID  Seqid  Gene_Start  Gene_End  Strand  CDS_Intervals
  # The user creates these files by parsing species-specific GFF/GTF annotations
  input_user_dir: "INPUT_user"

  # Path to GIGANTIC species list (all species in the species set)
  # One species name per line (Genus_species format)
  # From genomesDB STEP_4: output_to_input/speciesN_gigantic_species_list/species_list.txt
  gigantic_species_list: "INPUT_user/gigantic_species_list.txt"

  # Path to directory containing GIGANTIC proteome files for ID linkage (optional)
  # Files named: Genus_species.aa (symlinks or copies)
  # If provided, Source_Gene_IDs are linked to GIGANTIC identifiers via g_ prefix
  # Leave empty to skip ID linkage
  proteome_dir: ""

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================

output:
  # Main output directory
  base_dir: "OUTPUT_pipeline"

# ============================================================================
# NOTES
# ============================================================================
#
# WORKFLOW PURPOSE:
# Compute gene structure metrics from user-provided CDS interval data.
#
# HOW IT WORKS:
# 1. Script 001 validates user-provided gene structure files against GIGANTIC species set
#    - Species with valid data: PROCESSED
#    - Species without files: SKIPPED_NO_DATA
#    - Species with incomplete files: SKIPPED_INCOMPLETE
# 2. Script 002 reads CDS intervals and computes per-gene metrics
#    (gene length, exonic length, intronic length, exon count, protein size)
#    Optionally links Source_Gene_IDs to GIGANTIC identifiers via proteome
# 3. Script 003 computes genome-wide statistics and relative ranks per species
# 4. Script 004 compiles cross-species summary tables with processing status
#
# USER INPUT FORMAT:
#   One TSV file per species in INPUT_user/, named Genus_species-gene_coordinates.tsv:
#
#   Source_Gene_ID  Seqid  Gene_Start  Gene_End  Strand  CDS_Intervals
#   ENSG00000139618  chr13  32315474  32400266  +  32316422-32316527,32319077-32319325
#
#   Source_Gene_ID: Must match the g_ field in GIGANTIC proteome headers
#   CDS_Intervals: Comma-separated start-end pairs for coding sequence intervals
#
# METRICS COMPUTED:
#   Gene_Length          - Genomic span from gene start to end (bp)
#   Exonic_Length        - Sum of merged CDS intervals (bp)
#   Intronic_Length      - Gene length minus exonic length (bp)
#   Exon_Count           - Number of distinct CDS intervals after merging
#   CDS_Length           - Total coding sequence length (bp)
#   Protein_Size         - Estimated amino acids (CDS length / 3)
#
# UTRs are EXCLUDED (CDS features only) because annotation quality varies.
# Overlapping CDS intervals are merged before computing metrics.
#
# OUTPUT STRUCTURE:
#   output_to_input/speciesN_gigantic_gene_metrics/       - Per-species metrics
#   output_to_input/speciesN_gigantic_gene_sizes_summary/  - Cross-species summary
#
# Where N = count of processable species (those with valid gene structure data)
#
