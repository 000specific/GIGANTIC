# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
#     bash RUN-workflow.sh
#
# ============================================================================
#
# GIGANTIC sequence_groups_X_species - BLOCK_resolve_groups
# AI: Claude Code | Opus 4.8 | 2026 June 28
# Human: Eric Edsinger
#
# RESOLVES one "sequence group" set onto the species-tree clades. A sequence group
# is producer-agnostic — an orthogroup (orthology), an annogroup (annotation), a
# gene family, etc. This run reads ONE group set, adapts it into the standard
# membership (Script 001), then overlays it onto the species tree three ways:
#   002 deconvolution     - per group, member SEQUENCE + SPECIES counts per clade
#   003 per-species map   - per group, member sequence identifiers per species
#   004 composite clades  - per group, which clades its members span (4 algorithms)

# Label for this group set; names the output_to_input subdirectory.
# Convention: <species_set>_X_<producer-or-method>, e.g. "species70_X_OrthoHMM".
group_set_label: "species70_X_OrthoHMM"

# Species set the group members belong to (must match the species tree).
species_set_name: "species70"

# Which producer's native output to adapt into the standard membership (Script 001).
# Supported: orthogroups | (more added as small reader branches in Script 001).
producer: "orthogroups"

# Optional: also emit the per-structure deconvolution re-layout (2 x 105 files).
# The union tables already hold every clade's count (Rule 6 => stable across
# structures), so this is off by default; turn on only if a consumer needs the
# per-structure layout.
emit_per_structure: false

# Input paths (relative to this workflow directory)
inputs:
  # The producer's native group membership.
  #   orthogroups : orthogroups_gigantic_ids.tsv (one orthogroup per line; members
  #                 tab-delimited; Genus_species parsed from each member's -n_<phyloname>)
  producer_membership: "../../../orthogroups/output_to_input/BLOCK_orthohmm/orthogroups_gigantic_ids.tsv"

  # Species-tree clade->species mapping (trees_species, ALL structures). Read by
  # Script 002 (deconvolution) and Script 004 (composite clades). Clade species
  # sets are stable across structures (Rule 6).
  clade_species_mappings: "../../../trees_species/output_to_input/BLOCK_permutations_and_features/Species_Clade_Species_Mappings/9_ai-clade_species_mappings-all_structures.tsv"

  # Curated composite-clades manifest (Script 004) — the user's list of composite
  # clades to report (one per row; see the file's header). Relative to the workflow dir.
  composite_clades_manifest: "INPUT_user/composite_clades_manifest.tsv"

# =============================================================================
# Composite Clades (Script 004)
# =============================================================================
# A "composite clade" is a user-defined question about where a sequence group's
# member species fall on the species tree. This block defines the building-block
# GROUPS and the scope; the composite clades to REPORT are curated in
# INPUT_user/composite_clades_manifest.tsv, where each row picks one ALGORITHM:
#   - exact            : members come from EXACTLY the listed component groups
#   - absent           : members are ABSENT from ALL listed clades
#   - core_urclade     : members in >=1 outgroup of a target clade AND >=1 ingroup
#                        (the target's Ur = last-common-ancestor core)
#   - core_early_clade : members in >=2 ingroups (the target's "Early" window = its
#                        early descendant branches / the species tree's ambiguous nodes)
# Edit `groups` to analyze ANY clade grouping; the default is the five metazoan
# clades within Metazoa (these are CLADES, not phyla — Bilateria is a clade). Group
# names + the scope name (Metazoa) + any clade_id_name are resolvable as
# Target_Clade / Clades in the manifest.
composite_clades:
  reference_structure: "structure_001"
  scope_clade_id_name: "C082_Metazoa"
  outside_label: "NonMetazoa"
  groups:
    - { name: "Ctenophora", clade_id_names: [ "C086_Ctenophora" ] }
    - { name: "Porifera",   clade_id_names: [ "C090_Porifera" ] }
    - { name: "Placozoa",   clade_id_names: [ "C095_Placozoa" ] }
    - { name: "Cnidaria",   clade_id_names: [ "C102_Cnidaria" ] }
    - { name: "Bilateria",  clade_id_names: [ "C103_Bilateria" ] }

# Output configuration
output:
  #   OUTPUT_pipeline/1-output/   standard membership
  #   OUTPUT_pipeline/2-output/   deconvolution (sequence + species counts per clade)
  #   OUTPUT_pipeline/3-output/   per-species sequence map
  #   OUTPUT_pipeline/4-output/   composite clades
  base_dir: "OUTPUT_pipeline"

# =============================================================================
# Computational Resources (SLURM, when execution_mode is "slurm")
# =============================================================================
# The membership (~1.4M rows) and per-species pivot dominate memory; the work is
# dict/set aggregation. The deconvolution union is the heaviest step.
cpus: 4
memory_gb: 24
time_hours: 4

# =============================================================================
# Execution Mode  ("local" runs here; "slurm" self-submits as a SLURM job)
# =============================================================================
execution_mode: "slurm"
slurm_account: "your_account"
slurm_qos: "your_qos"

# Resume from cached NextFlow work/ (false = re-run from scratch)
resume: false
