# ============================================================================
# WORKFLOW CONFIGURATION - Edit this file before running
# ============================================================================
#
# This is the main configuration file for this workflow.
# Review and update the settings below for your project, then run:
#
#     bash RUN-workflow.sh
#
# ============================================================================

# GIGANTIC Origin-Conservation-Loss (OCL) Pipeline Configuration
# Annotations OCL: annogroup analysis across species tree structures
# AI: Claude Code | Opus 4.6 | 2026 April 18
# Human: Eric Edsinger

# Species set identifier (e.g., "species70", "speciesN")
# Replace SET_NAME_HERE with your species set name (e.g., species70)
species_set_name: "SET_NAME_HERE"

# Annotation sources (annotation tools / databases) to analyze, IN PARALLEL.
# These are annogroups subproject SOURCE names -- each selects a per-source annogroup
# set that is mapped onto the species tree structures. Annogroups are NOT computed
# here; they are imported from the annogroups subproject.
#
# This ONE run fans out over every listed source x every structure. Each source
# writes to its own output subtree (OUTPUT_pipeline/<source>/structure_NNN/...) and
# publishes as output_to_input/BLOCK_annotations_X_ocl/<species_set>_<source>/ -- so
# pfam, go, panther all coexist from a single run. They are NOT separate RUN versions
# (per the GIGANTIC convention, the latest RUN of this block supersedes earlier ones).
#   "all"            - every source with built annogroups in the annogroups output_to_input
#                      (<annogroups_dir>/<species_set>/<source>/)
#   [ pfam, go ]     - an explicit subset
annotation_databases: "all"

# Annogroup TYPES to map onto the species tree structures.
# The annogroups subproject defines four canonical types (feature, combination,
# architecture, absent). OCL is an ORIGIN engine: origin / conservation / loss
# only means something for an annogroup that is a coherent evolutionary unit with
# a single origin. 'absent' (sequences sharing NO feature) has no shared origin --
# its MRCA would resolve to the root, present everywhere -- so it is EXCLUDED here
# by design. Keep this list to the origin-bearing types.
annogroup_types:
  - "feature"
  - "combination"
  - "architecture"

# Input paths (relative to this workflow directory)
inputs:
  # Structure manifest file listing which tree structures to analyze
  # Format: TSV with column "structure_id" (e.g., "001", "002", ...)
  # Pipeline will analyze OCL for each structure listed
  structure_manifest: "INPUT_user/structure_manifest.tsv"

  # trees_species output directory (phylogenetic blocks, paths, clade-species mappings)
  # Points to trees_species output_to_input via relative path
  trees_species_dir: "../../../trees_species/output_to_input/BLOCK_permutations_and_features"

  # annogroups subproject output_to_input ROOT (the BLOCK_build_annogroups dir).
  # Script 001 reads each source's annogroup map from:
  #   <annogroups_dir>/<species_set_name>/<source>/2_ai-<source>-annogroup_map.tsv
  # Script 005 (species_tree_deconvolution) also reads each source's per-structure
  # annogroup tree-counts from
  #   <annogroups_dir>/<species_set>/<source>/annogroup_tree_counts_per_structure/.
  annogroups_dir: "../../../annogroups/output_to_input/BLOCK_build_annogroups"

  # Species-tree clade->species mapping (trees_species, ALL structures). Read by
  # Script 005 (species_tree_deconvolution — member-species counts per clade) and
  # Script 007 (composite_clades). Clade species sets are stable across structures (Rule 6).
  clade_species_mappings: "../../../trees_species/output_to_input/BLOCK_permutations_and_features/Species_Clade_Species_Mappings/9_ai-clade_species_mappings-all_structures.tsv"

  # Curated composite-clades manifest (Script 007) — the user's list of composite
  # clades to report (one per row; see the file's header). Relative to the workflow dir.
  composite_clades_manifest: "INPUT_user/composite_clades_manifest.tsv"

# =============================================================================
# Composite Clades (Script 007)
# =============================================================================
# A "composite clade" is a user-defined question about where an annogroup's member
# species fall on the species tree. This block defines the building-block GROUPS and
# the scope; the composite clades to REPORT are curated in
# INPUT_user/composite_clades_manifest.tsv, where each row picks one ALGORITHM:
#   - exact            : members come from EXACTLY the listed component groups
#   - absent           : members are ABSENT from ALL listed clades
#   - core_urclade     : members in >=1 outgroup of a target clade AND >=1 ingroup
#                        (the target's Ur = last-common-ancestor core)
#   - core_early_clade : members in >=2 ingroups (the target's "Early" window = its
#                        early descendant branches / the species tree's ambiguous nodes)
# Edit `groups` to analyze ANY clade grouping; the default is the five metazoan
# clades within Metazoa (these are CLADES, not phyla — Bilateria is a clade). Group
# names + the scope name (Metazoa) + any clade_id_name are resolvable as
# Target_Clade / Clades in the manifest.
composite_clades:
  reference_structure: "structure_001"
  scope_clade_id_name: "C082_Metazoa"
  outside_label: "NonMetazoa"
  groups:
    - { name: "Ctenophora", clade_id_names: [ "C086_Ctenophora" ] }
    - { name: "Porifera",   clade_id_names: [ "C090_Porifera" ] }
    - { name: "Placozoa",   clade_id_names: [ "C095_Placozoa" ] }
    - { name: "Cnidaria",   clade_id_names: [ "C102_Cnidaria" ] }
    - { name: "Bilateria",  clade_id_names: [ "C103_Bilateria" ] }

# Output configuration
output:
  # Main output directory (relative to this workflow directory). Each source gets its
  # own subtree: OUTPUT_pipeline/<source>/structure_NNN/1-output/ through 6-output/,
  # plus OUTPUT_pipeline/<source>/composite_clades/ (Script 007, once per source).
  base_dir: "OUTPUT_pipeline"

# =============================================================================
# Computational Resources
# =============================================================================
# These values are used by SLURM (job resources) when execution_mode is "slurm".
# Annotation OCL tends to have more features than orthogroup OCL (many annogroups
# per database), so memory may need to be higher.

cpus: 3
memory_gb: 20
time_hours: 24

# =============================================================================
# Execution Mode
# =============================================================================
# Controls where RUN-workflow.sh itself runs (the NextFlow driver).
#   "local" - Run directly on this machine
#   "slurm" - Self-submit as a SLURM job (driver runs on a compute node)

execution_mode: "slurm"

# SLURM settings (only used when execution_mode is "slurm")
slurm_account: "your_account"
slurm_qos: "your_qos"

# =============================================================================
# Parallelism Mode
# =============================================================================
# Controls how NextFlow dispatches the per-structure tasks (independent of
# execution_mode above -- they compose).
#   "slurm" - Each task submits as its own SLURM job (best for fewer/longer tasks)
#   "local" - All tasks run in parallel within this process, no per-task SLURM
#             overhead (best for many short tasks -- e.g. 105 structures x 5
#             scripts at seconds each)
#
# Combinations:
#   execution_mode  parallelism_mode  Use case
#   --------------  ----------------  --------
#   local           local             Single-machine dev
#   local           slurm             Driver on login, fan out to SLURM per task
#   slurm           local             One SLURM allocation, local parallelism inside (default)
#   slurm           slurm             Driver in a SLURM job, submits sub-jobs
#
# Default is "local" because OCL tasks are short and per-task SLURM overhead
# would dominate runtime. Switch to "slurm" only if per-task work is large
# enough to absorb the scheduling overhead.

parallelism_mode: "local"

# =============================================================================
# Resume from cached NextFlow work directory
# =============================================================================
# When true, NextFlow re-uses cached results from work/ for unchanged tasks
# (saves time on partial-failure recovery). When false, every task re-runs
# from scratch.
#
# Default: false -- stale-cache surprises have caused incorrect results in the
# past, so explicit opt-in is safer for research reproducibility. Flip to true
# when you intentionally want to resume after a known interruption.

resume: false
