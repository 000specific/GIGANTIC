# GIGANTIC tmbed Environment
# ===========================
#
# Environment for the annotations_hmms tmbed BLOCK.
# tmbed predicts transmembrane protein topology using protein language models.
#
# GPU: tmbed benefits significantly from GPU acceleration.
# CPU fallback is available but much slower.
# Set use_gpu and cpu_fallback in tmbed_config.yaml.
#
# INSTALLATION:
#   From project root:
#   bash RUN-setup_environments.sh
#
#   Or manually:
#   mamba env create -f conda_environments/ai_gigantic_tmbed.yml
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate ai_gigantic_tmbed

name: ai_gigantic_tmbed

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements (Python 3.10 required for CUDA PyTorch compatibility)
  - python==3.10.*
  - nextflow>=23.0

  # Required for transformers T5 tokenizer (SentencePiece protobuf parsing)
  - protobuf

  # PyTorch with CUDA and tmbed via pip
  # NOTE: conda-forge pytorch is CPU-only. CUDA PyTorch must come from pip
  # using the PyTorch CUDA index URL.
  # NOTE: tmbed was removed from PyPI. Install from GitHub source.
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch
    - git+https://github.com/BernhoferM/TMbed.git
