# GIGANTIC MAFFT Environment
# =========================================
#
# Per-tool conda environment for MAFFT multiple sequence alignment.
# Used by trees_gene_families STEP_2 phylogenetic analysis.
#
# INSTALLATION:
#   mamba env create -f conda_environments/ai_gigantic_mafft.yml
#
# ACTIVATION:
#   conda activate ai_gigantic_mafft

name: ai_gigantic_mafft

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python>=3.11
  - mafft
