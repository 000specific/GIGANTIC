# GIGANTIC Orthogroups X OCL Environment
# =======================================
#
# Environment for the orthogroups_X_ocl subproject.
# Runs Origin-Conservation-Loss (OCL) analysis of orthogroups
# across species tree topologies.
#
# INSTALLATION:
#   From project root:
#   bash RUN-setup_environments.sh
#
#   Or manually:
#   mamba env create -f conda_environments/ai_gigantic_orthogroups_X_ocl.yml
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate ai_gigantic_orthogroups_X_ocl

name: ai_gigantic_orthogroups_X_ocl

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0

  # Configuration parsing
  - pyyaml
