# GIGANTIC ClipKit Environment
# =========================================
#
# Per-tool conda environment for ClipKit alignment trimming.
# Used by trees_gene_families STEP_2 phylogenetic analysis.
#
# INSTALLATION:
#   mamba env create -f conda_environments/ai_gigantic_clipkit.yml
#
# ACTIVATION:
#   conda activate ai_gigantic_clipkit

name: ai_gigantic_clipkit

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python>=3.11
  - clipkit
