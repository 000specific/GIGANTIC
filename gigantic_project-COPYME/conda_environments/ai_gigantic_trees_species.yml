# GIGANTIC Trees Species Environment
# AI: Claude Code | Opus 4.6 | 2026 March 04
# Human: Eric Edsinger
# ====================================
#
# Environment for the trees_species subproject.
#
# Scripts 001-007 and 009 use Python standard library + PyYAML for
# config parsing. Script 008 requires ete3 + PyQt5 for species tree
# visualization (SVG and PDF output with headless Qt rendering).
#
# INSTALLATION:
#   From project root:
#   bash RUN-setup_environments.sh
#
#   Or manually:
#   mamba env create -f conda_environments/ai_gigantic_trees_species.yml
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate ai_gigantic_trees_species

name: ai_gigantic_trees_species

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0
  - pyyaml

  # Tree visualization (Script 008)
  - ete3
  - pyqt5
