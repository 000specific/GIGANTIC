# GIGANTIC Orthogroups - Broccoli Environment
# =============================================
#
# Tool-dedicated environment for Broccoli orthogroup detection.
# Mirrors the per-tool pattern used by ai_gigantic_orthogroups_orthohmm.yml.
#
# Why a dedicated env (vs the shared ai_gigantic_orthogroups.yml):
#   - Cleaner dependency boundaries between tools
#   - Lets each BLOCK's RUN-workflow.sh create its env on-demand without
#     blocking other BLOCKs that may not need (or may conflict with) Broccoli
#   - Matches the latest GIGANTIC convention seen in genomesDB
#
# INSTALLATION:
#   On-demand at first run of BLOCK_broccoli (RUN-workflow.sh creates
#   the env automatically if it does not yet exist).
#
#   Manual creation (optional):
#     mamba env create -f conda_environments/ai_gigantic_orthogroups_broccoli.yml
#
# ACTIVATION:
#   module load conda  # HiPerGator/HPC only
#   conda activate ai_gigantic_orthogroups_broccoli

name: ai_gigantic_orthogroups_broccoli

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0,<26.0   # <26 because NextFlow 26.x dropped top-level `import` in nextflow.config (breaks our SnakeYAML loader pattern)

  # External tools Broccoli invokes
  # Diamond — pairwise alignment for Step 2 of Broccoli's pipeline
  - diamond
  # FastTree — gene-tree inference for Step 2/3
  - fasttree
  # MCL — clustering algorithm used in Broccoli's network step
  - mcl

  # Python deps required by Broccoli
  - numpy
  - networkx
  - ete3

  # Broccoli itself (pip-only — not in conda channels)
  - pip
  - pip:
    - broccoli
