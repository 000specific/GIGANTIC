# GIGANTIC Gene Sizes Environment
# AI: Claude Code | Opus 4.6 | 2026 March 04
# Human: Eric Edsinger
# ====================================
#
# Environment for the gene_sizes subproject.
# Processes user-provided gene structure data using Python standard
# library (no external dependencies needed). Nextflow orchestrates the workflow.
#
# INSTALLATION:
#   From project root:
#   bash RUN-setup_environments.sh
#
#   Or manually:
#   mamba env create -f conda_environments/ai_gigantic_gene_sizes.yml
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate ai_gigantic_gene_sizes

name: ai_gigantic_gene_sizes

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0,<26.0   # <26 because NextFlow 26.x dropped top-level `import` in nextflow.config (breaks our SnakeYAML loader pattern); same constraint as ai_gigantic_orthogroups_orthohmm.yml
  - openjdk             # NextFlow needs a JVM; older NF builds don't pull it transitively, so request it explicitly
