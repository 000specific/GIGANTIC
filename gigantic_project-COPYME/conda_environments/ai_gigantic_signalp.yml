# GIGANTIC SignalP Environment
# =============================
#
# Environment for the annotations_hmms SignalP BLOCK.
# SignalP 6 predicts signal peptides and cleavage sites using deep learning.
#
# NOTE: SignalP 6 requires a license from DTU Health Tech:
#   https://services.healthtech.dtu.dk/services/SignalP-6.0/
#
# INSTALLATION (two steps):
#   1. Create conda environment:
#      mamba env create -f conda_environments/ai_gigantic_signalp.yml
#
#   2. Install SignalP 6 into the environment:
#      cd subprojects/annotations_hmms/BLOCK_signalp/
#      bash DOWNLOAD_SOFTWARE-signalp.sh
#      (Requires signalp-6.0h.fast.tar.gz in BLOCK_signalp/software/)
#
# Reference: https://rcs.ucalgary.ca/SignalP
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate ai_gigantic_signalp

name: ai_gigantic_signalp

channels:
  - conda-forge
  - defaults

dependencies:
  # Python (SignalP 6 tested with 3.9-3.11)
  - python>=3.9,<3.12
  - nextflow>=23.0

  # SignalP 6 dependencies (must be present before pip install)
  - pip
  - numpy
  - pillow
  - matplotlib
  - tqdm

  # PyTorch CPU (required by SignalP 6 deep learning models)
  - pytorch::pytorch=1.13
