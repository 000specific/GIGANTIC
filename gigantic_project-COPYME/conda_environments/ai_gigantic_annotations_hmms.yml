# GIGANTIC Annotations HMMs Environment
# ======================================
#
# Environment for the annotations_hmms BLOCK_build_annotation_database.
# Pure Python environment for parsing tool outputs and building the
# standardized annotation database. No heavy tool dependencies needed.
#
# NOTE: Each annotation tool has its own dedicated conda environment:
#   - ai_gigantic_interproscan (InterProScan BLOCK)
#   - ai_gigantic_deeploc (DeepLoc BLOCK)
#   - ai_gigantic_signalp (SignalP BLOCK)
#   - ai_gigantic_tmbed (tmbed BLOCK)
#   - ai_gigantic_metapredict (MetaPredict BLOCK)
#
# INSTALLATION:
#   From project root:
#   bash RUN-setup_environments.sh
#
#   Or manually:
#   mamba env create -f conda_environments/ai_gigantic_annotations_hmms.yml
#
# ACTIVATION:
#   module load conda  # (HiPerGator/HPC only)
#   conda activate ai_gigantic_annotations_hmms

name: ai_gigantic_annotations_hmms

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core requirements
  - python>=3.11
  - nextflow>=23.0

  # Database building uses only Python standard library
  # (pathlib, csv, json, collections, statistics, urllib)
