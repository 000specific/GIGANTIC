# GIGANTIC FastTree Environment
# =========================================
#
# Per-tool conda environment for FastTree approximate ML phylogenetics.
# Used by trees_gene_families STEP_2 phylogenetic analysis.
#
# INSTALLATION:
#   mamba env create -f conda_environments/ai_gigantic_fasttree.yml
#
# ACTIVATION:
#   conda activate ai_gigantic_fasttree

name: ai_gigantic_fasttree

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python>=3.11
  - fasttree
